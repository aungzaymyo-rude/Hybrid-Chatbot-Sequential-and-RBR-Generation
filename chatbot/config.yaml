project_name: multilingual-chatbot

data:
  dataset_path: data/train/intent_dataset.jsonl
  split_dir: data/splits
  train_ratio: 0.70
  validation_ratio: 0.15
  test_ratio: 0.15
  model_profiles:
    general:
      dataset_path: data/train/intent_dataset_general.jsonl
      intents:
        - greeting
        - help
        - cbc_info
        - sample_collection
        - rbc_term
        - wbc_term
        - platelet_term
        - differential_review
        - coag_test
        - blood_smear
        - quality_control
        - critical_value_reporting
        - capability_query
        - small_talk
        - thanks
        - goodbye
        - clarification
        - out_of_scope
        - unsafe_medical_request
        - incomplete_query
        - fallback
    report:
      dataset_path: data/train/intent_dataset_report.jsonl
      intents:
        - greeting
        - help
        - cbc_info
        - rbc_term
        - wbc_term
        - platelet_term
        - differential_review
        - blood_smear
        - critical_value_reporting
        - capability_query
        - small_talk
        - thanks
        - goodbye
        - clarification
        - out_of_scope
        - unsafe_medical_request
        - incomplete_query
        - fallback
        - cbc_result_parameter
        - cbc_flag_explanation
        - anemia_related_term
        - platelet_abnormality
        - differential_result_explanation
        - report_structure_help

model:
  type: sequential
  architecture: bilstm
  max_length: 64
  embedding_dim: 128
  hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  min_freq: 1
  max_vocab_size: 10000
model_default_key: general
model_registry:
  general:
    path: models/intent_general
    version: bilstm-general-v1
  report:
    path: models/intent_report
    version: bilstm-report-v1

training:
  batch_size: 32
  eval_batch_size: 64
  epochs: 8
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  warmup_steps: 0
  warmup_ratio: 0.0
  output_dir: models/intent_general
  seed: 42

inference:
  threshold: 0.45
  device: auto

logging:
  log_file: logs/app.log
  level: INFO

responses:
  default_lang: en
  knowledge_path: data/knowledge/hematology_responses.jsonl
  retrieval_threshold: 0.18

storage:
  backend: postgresql
  chat_db_path: data/reports/chat_history.db
  postgres:
    host: localhost
    port: 5432
    database: chatbot
    user: postgres
    password: P@ssw0rd
    sslmode: prefer

admin:
  default_recent_limit: 50
  low_confidence_threshold: 0.55

deployment:
  host: 0.0.0.0
  port: 8000
  reload: false
  http_redirect:
    enabled: true
    port: 8000
  ssl:
    enabled: false
    certfile: ../certs/server.crt
    keyfile: ../certs/server.key
    auto_generate: true
    common_name: localhost
